---
# patch.yml — Safe OS patch with optional reboot

- name: Patch all nodes
  hosts: "{{ target | default('all') }}"
  become: true
  serial: 1           # rolling update — one node at a time
  vars:
    allow_reboot: false

  tasks:
    - name: Gather facts
      ansible.builtin.setup:

    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Upgrade packages (Debian/Ubuntu)
      ansible.builtin.apt:
        upgrade: safe
      register: apt_result
      when: ansible_os_family == "Debian"

    - name: Update and upgrade (RHEL/Rocky)
      ansible.builtin.dnf:
        name: "*"
        state: latest        # noqa package-latest
      register: dnf_result
      when: ansible_os_family == "RedHat"

    - name: Check if reboot required (Debian)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_os_family == "Debian"

    - name: Reboot if required and allowed
      ansible.builtin.reboot:
        reboot_timeout: 300
      when:
        - allow_reboot | bool
        - reboot_required.stat is defined
        - reboot_required.stat.exists

    - name: Print patch summary
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: patches applied.
          Reboot needed={{ reboot_required.stat.exists | default(false) }}
